name: Skill Publish

on:
  workflow_dispatch:
    inputs:
      skill_slug:
        description: "要发布的 skill slug，留空则发布配置中所有启用项"
        required: false
        type: string
      expected_version:
        description: "期望发布的版本号，留空则以 SKILL.md 为准"
        required: false
        type: string
      changelog:
        description: "可选发布说明"
        required: false
        type: string
      dry_run:
        description: "是否仅校验和预演，不真实发布"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "skill-*-v*"

concurrency:
  group: clawhub-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      skill_slug: ${{ steps.resolve.outputs.skill_slug }}
      expected_version: ${{ steps.resolve.outputs.expected_version }}
      changelog: ${{ steps.resolve.outputs.changelog }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
    steps:
      - name: Resolve Publish Inputs
        id: resolve
        shell: bash
        run: |
          event_name="${{ github.event_name }}"
          tag_name="${{ github.ref_name }}"
          resolved_skill_slug="${{ inputs.skill_slug }}"
          resolved_expected_version="${{ inputs.expected_version }}"
          resolved_changelog="${{ inputs.changelog }}"
          resolved_dry_run="${{ inputs.dry_run }}"

          if [[ "$event_name" == "push" ]]; then
            if [[ ! "$tag_name" =~ ^skill-(.+)-v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$ ]]; then
              echo "非法 tag 格式: $tag_name。期望格式: skill-<slug>-v<version>" >&2
              exit 1
            fi

            resolved_skill_slug="${BASH_REMATCH[1]}"
            resolved_expected_version="${BASH_REMATCH[2]}"
            resolved_dry_run="false"
          fi

          {
            echo "skill_slug=$resolved_skill_slug"
            echo "expected_version=$resolved_expected_version"
            echo "dry_run=$resolved_dry_run"
            echo "changelog<<EOF"
            echo "$resolved_changelog"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved publish inputs: event=$event_name tag=$tag_name skill_slug=$resolved_skill_slug expected_version=$resolved_expected_version dry_run=$resolved_dry_run"

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
    permissions:
      contents: read
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Skill Metadata
        shell: bash
        run: |
          python ./scripts/ci/get_clawhub_skills.py \
            --config-path "clawhub/skills.publish.json" \
            --skill-slug "${{ needs.prepare.outputs.skill_slug }}" \
            --expected-version "${{ needs.prepare.outputs.expected_version }}" \
            --json-output

      - name: Publish Skill To ClawHub
        shell: bash
        run: |
          echo "Start publish job: skill_slug=${{ needs.prepare.outputs.skill_slug }} expected_version=${{ needs.prepare.outputs.expected_version }} dry_run=${{ needs.prepare.outputs.dry_run }}"
          python ./scripts/ci/publish_clawhub_skills.py \
            --config-path "clawhub/skills.publish.json" \
            --skill-slug "${{ needs.prepare.outputs.skill_slug }}" \
            --expected-version "${{ needs.prepare.outputs.expected_version }}" \
            --changelog "${{ needs.prepare.outputs.changelog }}" \
            ${{ needs.prepare.outputs.dry_run == 'true' && '--dry-run' || '' }}
