name: Skill Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate ClawHub Publish Config
        shell: bash
        run: |
          python ./scripts/ci/get_clawhub_skills.py --config-path "clawhub/skills.publish.json" --json-output
